services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks: [amk-net]
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      MONGO_URL: ${MONGO_URL:-mongodb://mongo:27017}
      DB_NAME: ${DB_NAME:-amarktai_builder}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://builder.amarktai.com}
      GENX_API_KEY: ${GENX_API_KEY:-}
      GENX_BASE_URL: ${GENX_BASE_URL:-https://query.genx.sh/v1}
      GENX_MODEL_REASONING: ${GENX_MODEL_REASONING:-claude-sonnet-4-6}
      GENX_MODEL_RESEARCH:  ${GENX_MODEL_RESEARCH:-gpt-5.4-mini}
      GENX_MODEL_EDITS:     ${GENX_MODEL_EDITS:-claude-haiku-4-5}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET for production deploy}
      JWT_ALGO: ${JWT_ALGO:-HS256}
      JWT_TTL_HOURS: ${JWT_TTL_HOURS:-168}
      ADMIN_EMAIL: ${ADMIN_EMAIL:?Set ADMIN_EMAIL for production deploy}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD for production deploy}
      SETTINGS_ENCRYPTION_KEY: ${SETTINGS_ENCRYPTION_KEY:?Set SETTINGS_ENCRYPTION_KEY for production deploy}
      GITHUB_PAT: ${GITHUB_PAT:-}
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY:-}
      FIRECRAWL_BASE_URL: ${FIRECRAWL_BASE_URL:-https://api.firecrawl.dev}
      MEDIA_STORAGE_PATH: ${MEDIA_STORAGE_PATH:-/app/storage/media}
      MEDIA_MAX_UPLOAD_MB: ${MEDIA_MAX_UPLOAD_MB:-25}
      BUILDS_STORAGE_ROOT: ${BUILDS_STORAGE_ROOT:-/var/www/amarktai/builds}
    depends_on:
      mongo:
        condition: service_healthy
    networks: [amk-net]
    ports:
      - "${BACKEND_PORT:-8001}:8001"
    volumes:
      - media_data:/app/storage/media
      - ${BUILDS_STORAGE_ROOT:-/var/www/amarktai/builds}:/var/www/amarktai/builds

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_BACKEND_URL: ${REACT_APP_BACKEND_URL:-https://builder.amarktai.com}
    restart: unless-stopped
    depends_on: [backend]
    networks: [amk-net]
    ports:
      - "${FRONTEND_PORT:-8080}:80"

networks:
  amk-net:

volumes:
  mongo_data:
  media_data:
