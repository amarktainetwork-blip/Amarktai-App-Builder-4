# nginx/test.amarktai.com.conf
# Nginx reverse-proxy config for the staging / test deployment at test.amarktai.com.
#
# Prerequisites:
#   sudo apt-get install -y certbot python3-certbot-nginx
#   sudo certbot --nginx -d test.amarktai.com
#
# After certbot runs, it will add the SSL/certificate block automatically.
# Reload nginx after any change:
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name test.amarktai.com;

    # Redirect HTTP → HTTPS (certbot will manage this block)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name test.amarktai.com;

    # certbot manages these certificate paths
    ssl_certificate     /etc/letsencrypt/live/test.amarktai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/test.amarktai.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # ── API / Backend ────────────────────────────────────────────────────────
    # Test backend runs on port 8011 (see docker-compose.test.yml BACKEND_PORT)
    location /api/ {
        proxy_pass         http://127.0.0.1:8011;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── WebSocket ─────────────────────────────────────────────────────────────
    location /api/ws/ {
        proxy_pass         http://127.0.0.1:8011;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 600s;
    }

    # ── Frontend ─────────────────────────────────────────────────────────────
    # Test frontend runs on port 8090 (see docker-compose.test.yml FRONTEND_PORT)
    location / {
        proxy_pass         http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
